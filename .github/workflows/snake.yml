name: Generate Snake

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Karanvaghela07
          outputs: |
            dist/github-snake.svg?color_snake=ff6b35&color_dots=0d1117,1a1b2e,2d1b4e,6E40C9,ff6b35
            dist/github-snake-dark.svg?color_snake=ff6b35&color_dots=0d1117,1a1b2e,2d1b4e,6E40C9,ff6b35
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          commit_message: "Update snake animation"
